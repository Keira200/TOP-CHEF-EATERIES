<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Manage Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fefaf5; padding: 2rem; }
    h1 { color: #B65F1E; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
    .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 20px; padding: 1rem; text-align: center; flex: 1; min-width: 100px; border: 1px solid #f0e1d0; }
    .stat-number { font-size: 1.8rem; font-weight: 800; color: #E17B2E; }
    .stat-label { font-size: 0.8rem; color: #7a6248; }
    .order-card { background: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #f0e1d0; }
    .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #f0e0ce; }
    .order-number { font-family: monospace; font-weight: bold; color: #E17B2E; font-size: 1rem; }
    .status { padding: 0.3rem 1rem; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #cce5ff; color: #004085; }
    .status-preparing { background: #d4edda; color: #155724; }
    .status-out_for_delivery { background: #d1ecf1; color: #0c5460; }
    .status-delivered { background: #28a745; color: white; }
    .order-details { margin: 1rem 0; }
    .order-details p { margin: 0.3rem 0; font-size: 0.9rem; }
    .order-items { margin: 0.5rem 0; padding-left: 1rem; }
    .order-items li { font-size: 0.85rem; color: #7a6248; }
    .status-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .status-btn { padding: 0.5rem 1rem; border: none; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; }
    .status-btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .refresh-btn { background: #E17B2E; color: white; border: none; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; margin-bottom: 1rem; font-weight: 600; }
    .loading { text-align: center; padding: 2rem; color: #b6a089; }
    .empty { text-align: center; padding: 3rem; color: #b6a089; }
    footer { background: #2c2418; color: #f0e0ce; padding: 2rem; text-align: center; margin-top: 2rem; border-radius: 20px; }
  </style>
</head>
<body>
  <h1><i class="fas fa-clipboard-list"></i> Manage Orders</h1>
  
  <div class="stats" id="statsContainer">
    <div class="stat-card"><div class="stat-number" id="totalOrders">-</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-number" id="pendingOrders">-</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-number" id="preparingOrders">-</div><div class="stat-label">Preparing</div></div>
    <div class="stat-card"><div class="stat-number" id="deliveredOrders">-</div><div class="stat-label">Delivered</div></div>
    <div class="stat-card"><div class="stat-number" id="totalRevenue">-</div><div class="stat-label">Revenue (KES)</div></div>
  </div>
  
  <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh Orders</button>
  <div id="ordersList"><div class="loading">Loading orders...</div></div>
  <footer><p>&copy; 2026 Top Chef Eateries — Admin Order Management</p></footer>

  <script>
    const API_URL = window.location.origin;

    async function loadStats() {
      try {
        const response = await fetch(`${API_URL}/api/stats`);
        const stats = await response.json();
        document.getElementById('totalOrders').innerText = stats.total_orders || 0;
        document.getElementById('pendingOrders').innerText = stats.pending || 0;
        document.getElementById('preparingOrders').innerText = stats.preparing || 0;
        document.getElementById('deliveredOrders').innerText = stats.delivered || 0;
        document.getElementById('totalRevenue').innerText = (stats.total_revenue || 0).toLocaleString();
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function getStatusText(status) {
      const texts = { 
        'pending': '📋 Order Received', 
        'confirmed': '✅ Payment Confirmed', 
        'preparing': '🍳 Preparing Food', 
        'out_for_delivery': '🚚 Out for Delivery', 
        'delivered': '🎉 Delivered' 
      };
      return texts[status] || status;
    }

    function getStatusClass(status) {
      const classes = { 
        'pending': 'status-pending', 
        'confirmed': 'status-confirmed', 
        'preparing': 'status-preparing', 
        'out_for_delivery': 'status-out_for_delivery', 
        'delivered': 'status-delivered' 
      };
      return classes[status] || 'status-pending';
    }

    async function updateOrderStatus(orderNumber, newStatus) {
      try {
        const response = await fetch(`${API_URL}/api/orders/${orderNumber}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus })
        });
        
        if (response.ok) {
          const result = await response.json();
          console.log(`✅ Order ${orderNumber} updated: ${result.oldStatus} → ${result.newStatus}`);
          alert(`✅ Order status updated to: ${getStatusText(newStatus)}`);
          loadOrders(); // Refresh the list
          loadStats(); // Refresh stats
        } else {
          const error = await response.json();
          alert(`❌ Error: ${error.error}`);
        }
      } catch (error) {
        console.error('Error updating order:', error);
        alert('Failed to update order status. Make sure the server is running.');
      }
    }

    async function loadOrders() {
      const container = document.getElementById('ordersList');
      container.innerHTML = '<div class="loading">Loading orders...</div>';
      
      try {
        const response = await fetch(`${API_URL}/api/orders`);
        if (!response.ok) throw new Error('Failed to fetch orders');
        
        const orders = await response.json();
        
        if (orders.length === 0) {
          container.innerHTML = '<div class="empty">No orders found. Place a test order first.</div>';
          return;
        }
        
        container.innerHTML = orders.map(order => `
          <div class="order-card">
            <div class="order-header">
              <span class="order-number">#${order.order_number}</span>
              <span class="status ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
            </div>
            <div class="order-details">
              <p><strong>Customer:</strong> ${order.customer_name}</p>
              <p><strong>Phone:</strong> ${order.customer_phone}</p>
              <p><strong>Address:</strong> ${order.delivery_address}</p>
              <p><strong>Ordered:</strong> ${new Date(order.created_at).toLocaleString()}</p>
            </div>
            <div class="order-items">
              <strong>Items:</strong>
              <ul>
                ${order.items.map(item => `<li>🍽️ ${item.name} x${item.quantity} - KES ${(item.price * item.quantity).toLocaleString()}</li>`).join('')}
              </ul>
            </div>
            <p><strong>Total:</strong> KES ${order.total_amount.toLocaleString()}</p>
            <p><strong>Payment:</strong> ${order.payment_method}</p>
            <div class="status-buttons">
              <button class="status-btn" style="background:#fff3cd;color:#856404;" onclick="updateOrderStatus('${order.order_number}', 'pending')">📋 Received</button>
              <button class="status-btn" style="background:#cce5ff;color:#004085;" onclick="updateOrderStatus('${order.order_number}', 'confirmed')">✅ Confirmed</button>
              <button class="status-btn" style="background:#d4edda;color:#155724;" onclick="updateOrderStatus('${order.order_number}', 'preparing')">🍳 Preparing</button>
              <button class="status-btn" style="background:#d1ecf1;color:#0c5460;" onclick="updateOrderStatus('${order.order_number}', 'out_for_delivery')">🚚 Out for Delivery</button>
              <button class="status-btn" style="background:#28a745;color:white;" onclick="updateOrderStatus('${order.order_number}', 'delivered')">🎉 Delivered</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error loading orders:', error);
        container.innerHTML = '<div class="empty">Error loading orders. Make sure the server is running on port 3000.</div>';
      }
    }

    // Auto-refresh every 10 seconds
    loadOrders();
    loadStats();
    setInterval(() => { loadOrders(); loadStats(); }, 10000);
  </script>
</body>
</html>
